spring.application.name=backend

# Aqui entra as configurações do banco de dados
spring.datasource.url=jdbc:mysql://localhost:3306/meubanco
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=update 
#Com essa configuração o hibernate analiza a entity e compara com o schema esperado no banco
#Se apresentar discrepancias entre o banco e a entity, ele modifica o banco adicionando tabelas,colunas e restrições


spring.jpa.show-sql=true
# Faz o hibernate escrever todos sql statements no console
